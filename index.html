<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sáng tạo Poster Phim</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Be+Vietnam+Pro:ital,wght@0,100..900;1,100..900&family=Luckiest+Guy&family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Pattaya&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-gray-900 text-gray-800 overflow-hidden h-screen w-screen flex select-none">
    
    <!-- LEFT WORKSPACE (60%) -->
    <main id="workspace" class="w-[60%] h-full flex flex-col relative bg-gray-800 p-4">
      
      <!-- Canvas Container -->
      <div id="canvas-container" class="flex-1 flex items-center justify-center overflow-hidden">
        
        <!-- The Canvas -->
        <div id="poster-canvas" class="bg-white shadow-cinema relative overflow-hidden transition-all duration-500 ease-in-out" data-orientation="portrait" style="width: 600px; height: 800px;">
          <!-- Layers -->
          <div id="canvas-background-layer" class="absolute inset-0 pointer-events-none"></div>
          <div id="canvas-elements-layer" class="absolute inset-0 pointer-events-none"></div>
          <div id="canvas-text-layer" class="absolute inset-0 pointer-events-none"></div>
        </div>

      </div>
    </main>

    <!-- RIGHT SIDEBAR (40%) -->
    <aside id="sidebar" class="w-[40%] h-full bg-slate-50 flex flex-col shadow-2xl border-l border-gray-200 z-50">
      
      <header class="p-6 bg-white border-b border-gray-200">
        <h1 class="text-3xl font-be-vietnam font-black text-indigo-700 tracking-tight">Sáng tạo Poster Phim</h1>
        <p class="text-sm text-gray-500 mt-1 font-be-vietnam">Kéo thả để thiết kế poster phim của riêng bạn!</p>
      </header>

      <!-- Components Area -->
      <div class="flex-1 overflow-y-auto p-4 space-y-6">
        
        <!-- Backgrounds Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
          <h2 class="font-bold text-lg mb-3 text-gray-800">1. Hình nền</h2>
          <div class="grid grid-cols-2 gap-3" id="panel-backgrounds">
            <img src="/assets/bg_pastel_sky.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_sunny_day.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_clean_geometric.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_abstract_gradient.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_cyberpunk.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_beach.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
            <img src="/assets/bg_magic_castle.png" class="draggable-bg w-full aspect-video object-cover rounded-lg cursor-pointer hover:ring-2 hover:ring-blue-500 transition" draggable="true" data-type="background">
          </div>
        </section>

        <!-- Characters Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
          <h2 class="font-bold text-lg mb-3 text-gray-800">2. Nhân vật & Sticker</h2>
          <div class="grid grid-cols-3 gap-3" id="panel-characters">
            <img src="/assets/char_joy.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/char_angry.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/char_sad.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/char_cool.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/char_sleepy.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/char_laughing.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
          </div>
        </section>

        <!-- Props Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
          <h2 class="font-bold text-lg mb-3 text-gray-800">3. Đồ vật & Trang trí</h2>
          <div class="grid grid-cols-3 gap-3" id="panel-props">
            <img src="/assets/prop_tree.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_house.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_car.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_skateboard.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_broken_car.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_dropped_icecream.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_camera_tripod.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
            <img src="/assets/prop_bed.png" class="draggable-element w-full aspect-square object-contain rounded-lg cursor-grab hover:bg-gray-100 transition p-2 border border-gray-100" draggable="true" data-type="character">
          </div>
        </section>

        <!-- Titles Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
          <h2 class="font-bold text-lg mb-3 text-gray-800">4. Tên phim</h2>
          <button id="add-title-btn" class="w-full bg-blue-100 text-blue-700 font-bold py-3 rounded-lg border-2 border-blue-200 hover:bg-blue-200 transition border-dashed flex items-center justify-center gap-2">
            <span class="text-xl">+</span> Thêm Tiêu Đề
          </button>
          
          <!-- Control Panel (hidden by default) -->
          <div id="element-control-panel" class="mt-4 p-3 bg-gray-50 rounded-lg border border-gray-200 hidden">
            <div id="text-controls" class="mb-3">
              <p class="text-sm font-semibold text-gray-600 mb-2">Chọn phông chữ:</p>
              <select id="font-selector" class="w-full p-2 border rounded border-gray-300 bg-white font-be-vietnam text-sm">
                <option value="font-anton" class="font-anton text-lg">Anton (Tiếng Việt - Dày, Mạnh mẽ)</option>
                <option value="font-pattaya" class="font-pattaya text-lg">Pattaya (Tiếng Việt - Uốn lượn, Nghệ thuật)</option>
                <option value="font-mali" class="font-mali text-lg">Mali (Tiếng Việt - Đáng yêu, Vẽ tay)</option>
                <option value="font-be-vietnam" class="font-be-vietnam text-lg">Be Vietnam Pro (Tiếng Việt - Hiện đại, Rõ ràng)</option>
                <option value="font-luckiest" class="font-luckiest text-lg">Luckiest Guy (Tiếng Anh - Hoạt hình béo)</option>
                <option value="font-bangers" class="font-bangers text-lg">Bangers (Tiếng Anh - Bùng nổ, Truyện tranh)</option>
              </select>
              <div class="mt-3 flex gap-2">
                <input type="color" id="text-color-picker" value="#ffffff" class="w-10 h-10 p-0 border-0 rounded cursor-pointer">
                <span class="text-xs text-gray-500 self-center">Màu chữ</span>
              </div>
            </div>
            
            <div class="border-t border-gray-200 pt-3 mt-3">
              <p class="text-sm font-semibold text-gray-600 mb-2">Kích thước:</p>
              <input type="range" id="size-slider" min="0.2" max="3" step="0.1" value="1" class="w-full">
            </div>
          </div>
        </section>

        <!-- Billing Block Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
          <h2 class="font-bold text-lg mb-3 text-gray-800">5. Thông tin của phim</h2>
          <button id="add-billing-btn" class="w-full bg-purple-100 text-purple-700 font-bold py-3 rounded-lg border-2 border-purple-200 hover:bg-purple-200 transition flex items-center justify-center gap-2 cursor-pointer">
            <span class="text-xl">+</span> Thêm thông tin đoàn phim
          </button>
        </section>

      </div>

      <!-- Action Buttons -->
      <footer class="p-6 bg-white border-t border-gray-200 flex gap-3">
        <button id="btn-save" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl shadow transition">
          💾 Lưu
        </button>
        <button id="btn-reset" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow transition">
          🗑️ Làm mới
        </button>
        <button id="btn-preview" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow transition">
          🎬 Xem trước
        </button>
      </footer>
    </aside>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-opacity duration-300 z-[100] font-be-vietnam font-bold">
      Đã lưu tác phẩm thành công!
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden flex-col items-center justify-center opacity-0 transition-opacity duration-500">
      <button id="btn-close-preview" class="absolute top-6 right-6 text-white text-xl font-bold bg-white/20 hover:bg-white/40 rounded-full w-12 h-12 flex items-center justify-center transition">
        ✕
      </button>
      <div id="preview-container" class="shadow-2xl ring-4 ring-white/20 rounded">
        <!-- Canvas will be cloned here -->
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
